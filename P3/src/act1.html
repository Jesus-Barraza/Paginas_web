<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba calcularCobro</title>
    <link rel="stylesheet" href="./css/act1.css">
</head>
<body>
    <h1>Calcular Cobro</h1>

    <label for="horas">Horas trabajadas:</label>
    <input type="number" id="horas" min="0">
    <button id="btnCalcular">Calcular</button>

    <p id="resultado"></p>

    <!-- Vinculación del archivo JS -->
    <script src="./js/act1.js"></script>
    <script>
        // Usamos la función exportada desde act1.js
        const { calcularCobro } = window;

        document.getElementById("btnCalcular").addEventListener("click", () => {
            const horas = parseInt(document.getElementById("horas").value, 10);
            try {
                const resultado = calcularCobro(horas);
                document.getElementById("resultado").textContent = 
                    `El cobro es: $${resultado}`;
            } catch (error) {
                document.getElementById("resultado").textContent = 
                    `Error: ${error.message}`;
            }
        });
    </script>
</body>
</html>
